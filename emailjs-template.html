<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>New portfolio message</title>
  </head>
  <body style="margin:0;padding:0;background:#f1f5f9;font-family:Inter,Segoe UI,Arial,sans-serif;color:#0f172a;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f1f5f9;padding:32px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:560px;background:#ffffff;border:1px solid #e2e8f0;border-radius:16px;overflow:hidden;">
            <tr>
              <td style="background:linear-gradient(135deg,#3b82f6,#6366f1);padding:20px 24px;">
                <p style="margin:0;font-size:13px;letter-spacing:0.08em;text-transform:uppercase;color:rgba(255,255,255,0.85);font-weight:700;">Portfolio Contact</p>
                <h1 style="margin:6px 0 0;font-size:22px;line-height:1.3;color:#ffffff;font-weight:700;">New message received</h1>
              </td>
            </tr>
            <tr>
              <td style="padding:28px 24px;">
                <p style="margin:0 0 18px;font-size:15px;line-height:1.6;color:#334155;">
                  Hello {{to_name}}, someone contacted you through your portfolio.
                </p>

                <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;">
                  <tr>
                    <td style="padding:16px 18px;">
                      <p style="margin:0 0 4px;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:#64748b;font-weight:700;">From</p>
                      <p style="margin:0;font-size:15px;font-weight:600;color:#0f172a;">{{from_name}}</p>
                      <p style="margin:4px 0 0;font-size:14px;color:#3b82f6;">{{from_email}}</p>
                    </td>
                  </tr>
                  <tr>
                    <td style="padding:0 18px 16px;">
                      <p style="margin:0 0 4px;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:#64748b;font-weight:700;">Subject</p>
                      <p style="margin:0;font-size:15px;color:#0f172a;">{{subject}}</p>
                    </td>
                  </tr>
                </table>

                <p style="margin:22px 0 8px;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:#64748b;font-weight:700;">Message</p>
                <div style="padding:16px 18px;background:#ffffff;border:1px solid #e2e8f0;border-radius:12px;font-size:15px;line-height:1.7;color:#1e293b;white-space:pre-wrap;">{{message}}</div>

                <p style="margin:24px 0 0;font-size:13px;color:#64748b;line-height:1.5;">
                  Reply directly to this email to respond to {{from_name}}.
                </p>
              </td>
            </tr>
            <tr>
              <td style="padding:14px 24px 20px;border-top:1px solid #e2e8f0;">
                <p style="margin:0;font-size:12px;color:#94a3b8;">Sent from Prem Ghosh Portfolio</p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
